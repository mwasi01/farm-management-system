{% extends "base.html" %}

{% block title %}Add Production Record - {{ animal.tag_number }}{% endblock %}

{% block extra_js %}
<script>
// Preview image before upload
function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('imagePreview').src = e.target.result;
            document.getElementById('imagePreview').style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-chart-line text-primary me-2"></i>Add Production Record</h1>
    <p class="text-muted">Animal: {{ animal.tag_number }} - {{ animal.name or 'Unnamed' }}</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Product Type</label>
                    <select name="product_type" class="form-select" required>
                        <option value="">Select Product</option>
                        <option value="Milk">Milk</option>
                        <option value="Eggs">Eggs</option>
                        <option value="Wool">Wool</option>
                        <option value="Meat">Meat</option>
                        <option value="Honey">Honey</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Production Date</label>
                    <input type="date" name="production_date" class="form-control" 
                           value="{{ now().strftime('%Y-%m-%d') }}" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" step="0.01" name="quantity" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Unit</label>
                    <select name="unit" class="form-select">
                        <option value="Litres">Litres</option>
                        <option value="Kg">Kg</option>
                        <option value="Grams">Grams</option>
                        <option value="Pieces">Pieces</option>
                        <option value="Bags">Bags</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Value (Ksh)</label>
                    <input type="number" step="0.01" name="value_ksh" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Production Time</label>
                    <select name="production_time" class="form-select">
                        <option value="Morning">Morning</option>
                        <option value="Afternoon">Afternoon</option>
                        <option value="Evening">Evening</option>
                        <option value="All Day">All Day</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Quality Grade</label>
                    <select name="quality_grade" class="form-select">
                        <option value="">Select Grade</option>
                        <option value="Grade A">Grade A</option>
                        <option value="Grade B">Grade B</option>
                        <option value="Grade C">Grade C</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Buyer (if sold)</label>
                    <input type="text" name="buyer" class="form-control" placeholder="Buyer name">
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Photo/Image</label>
                    <input type="file" name="image" class="form-control" accept="image/*" onchange="previewImage(this)">
                    <div class="mt-2">
                        <img id="imagePreview" style="max-width: 200px; max-height: 200px; display: none; border-radius: 8px;">
                    </div>
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="3" placeholder="Any additional notes..."></textarea>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i>Save Record
                </button>
                <a href="{{ url_for('livestock_detail', livestock_id=animal.id) }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
