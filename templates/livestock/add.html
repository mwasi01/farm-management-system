{% extends "base.html" %}

{% block title %}Add Livestock{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const categorySelect = document.getElementById('category_id');
    const breedSelect = document.getElementById('breed');
    
    // Store breeds data
    const breedsData = {
        {% for category in categories %}
        "{{ category.id }}": [
            {% for breed in category.breeds %}
            "{{ breed.name }}"{% if not loop.last %},{% endif %}
            {% endfor %}
        ]{% if not loop.last %},{% endif %}
        {% endfor %}
    };
    
    // Function to update breeds
    function updateBreeds() {
        const categoryId = categorySelect.value;
        const breeds = breedsData[categoryId] || [];
        
        breedSelect.innerHTML = '<option value="">Select Breed</option>';
        breeds.forEach(function(breed) {
            const option = document.createElement('option');
            option.value = breed;
            option.textContent = breed;
            breedSelect.appendChild(option);
        });
    }
    
    // Update breeds when category changes
    categorySelect.addEventListener('change', updateBreeds);
    
    // Initial update if category is selected
    if (categorySelect.value) {
        updateBreeds();
    }
});
</script>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-plus-circle text-primary me-2"></i>Add Livestock</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Tag Number</label>
                    <input type="text" name="tag_number" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Category</label>
                    <select name="category_id" id="category_id" class="form-select" required>
                        <option value="">Select Category</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Breed</label>
                    <select name="breed" id="breed" class="form-select">
                        <option value="">Select Breed</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Sex</label>
                    <select name="sex" class="form-select">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" name="date_of_birth" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Color</label>
                    <input type="text" name="color" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Shed Number</label>
                    <input type="text" name="shed_number" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Current Weight (kg)</label>
                    <input type="number" step="0.01" name="current_weight" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Estimated Value (Ksh)</label>
                    <input type="number" step="0.01" name="estimated_value" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Dam Tag</label>
                    <input type="text" name="dam_tag" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Sire Tag</label>
                    <input type="text" name="sire_tag" class="form-control">
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Markings</label>
                    <input type="text" name="markings" class="form-control">
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i>Save Animal
                </button>
                <a href="{{ url_for('livestock_list') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
