{% extends "base.html" %}

{% block title %}System Settings{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-cog text-primary me-2"></i>System Settings</h1>
</div>

<div class="row g-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-building me-2"></i>Farm Information
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('save_settings') }}">
                    <div class="mb-3">
                        <label class="form-label">Farm Name</label>
                        <input type="text" name="farm_name" class="form-control" value="My Farm">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" name="farm_location" class="form-control" value="Kenya">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Currency</label>
                        <input type="text" name="currency" class="form-control" value="Ksh">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company_name" class="form-control" value="Farm Management Ltd">
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Save Settings
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-users me-2"></i>HR Settings
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('save_settings') }}">
                    <div class="mb-3">
                        <label class="form-label">Working Hours Per Day</label>
                        <input type="number" name="working_hours_per_day" class="form-control" value="8">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Overtime Multiplier</label>
                        <input type="number" step="0.1" name="overtime_multiplier" class="form-control" value="1.5">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Annual Leave Days</label>
                        <input type="number" name="annual_leave_days" class="form-control" value="21">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Sick Leave Days</label>
                        <input type="number" name="sick_leave_days" class="form-control" value="7">
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Save Settings
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-database me-2"></i>System Information
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <p><strong>Version:</strong> 1.0</p>
                    </div>
                    <div class="col-md-4">
                        <p><strong>Database:</strong> SQLite</p>
                    </div>
                    <div class="col-md-4">
                        <p><strong>Users:</strong> {{ settings|length }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
