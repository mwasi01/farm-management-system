{% extends "base.html" %}

{% block title %}Add Harvest{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-plus-circle text-success me-2"></i>Add Harvest</h1>
    <p class="text-muted">Crop: {{ planting.crop.name }} - Field: {{ planting.field.field_name }}</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Harvest Date</label>
                    <input type="date" name="harvest_date" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Quantity (kg)</label>
                    <input type="number" step="0.01" name="quantity_kg" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Quality Grade</label>
                    <select name="quality_grade" class="form-select">
                        <option value="">Select Grade</option>
                        <option value="Grade 1">Grade 1</option>
                        <option value="Grade 2">Grade 2</option>
                        <option value="Grade 3">Grade 3</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Moisture Content (%)</label>
                    <input type="number" step="0.1" name="moisture_content" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Harvesting Method</label>
                    <select name="harvesting_method" class="form-select">
                        <option value="Manual">Manual</option>
                        <option value="Mechanical">Mechanical</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Workers Involved</label>
                    <input type="number" name="workers_involved" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Labor Cost (Ksh)</label>
                    <input type="number" step="0.01" name="labor_cost" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Storage Location</label>
                    <input type="text" name="storage_location" class="form-control" placeholder="e.g., Store 1, Silo A">
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="3"></textarea>
                </div>
                <div class="col-md-12 mb-3">
                    <div class="form-check">
                        <input type="checkbox" name="final_harvest" class="form-check-input" id="finalHarvest">
                        <label class="form-check-label" for="finalHarvest">Mark as final harvest (close planting)</label>
                    </div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-save me-2"></i>Save Harvest
                </button>
                <a href="{{ url_for('planting_detail', planting_id=planting.id) }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
